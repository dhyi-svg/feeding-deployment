# ekf_zed_wheel.yaml -- robot_localization EKF base config for the LIVE
# ekf_fused_imu_wheel (sensors.launch), which loads this file and OVERRIDES:
#   odom0 -> /odometry/_zed_vio_disabled (a never-published topic: VIO retired)
#   imu0  -> /zed_mini/zed_node/imu/data_debiased, fusing vyaw ONLY
#   publish_tf -> true (it owns odom->vention_base_link since 2026-07-13)
#
# [2026-07-15] ZED runs IMU-only (depth+tracking off after recurring SDK
# segfaults); the sanitized-ZED-velocity odom0 chain this file originally
# described (zed_pose_to_odom_feedback -> odom_feedback_cov -> cov relay) is
# retired and the Stage-1 observer harness (fused_odom_observer.launch) is
# deleted. The odom0 default below points at the same disabled topic as the
# live override so disk matches runtime; effective live inputs are odom1
# (wheel) + the launch-side imu0 (debiased gyro vyaw).
#
#   odom1 = /wheel_odom  -- encoder velocity (body-frame twist; forward good,
#           yaw advisory: skid-steer scrub, ~35 deg full-turn under-rotation
#           -- hence low weight / not over-trusted below).
#
# TWIST-ONLY fusion (no absolute pose/orientation), so the output is a pure
# dead-reckoning estimate directly comparable to the wheel open-loop trace in
# drift_trace_compare.py.
#
# Frames: base_link_frame = vention_base_link matches /wheel_odom's child frame
# (no transform).

frequency: 20.0
sensor_timeout: 0.2
two_d_mode: true
publish_tf: false
publish_acceleration: false

map_frame: map
odom_frame: odom
base_link_frame: vention_base_link
world_frame: odom

# --- odom0: DISABLED (never-published topic; matches the live override) ---
odom0: /odometry/_zed_vio_disabled
#              x      y      z      roll   pitch  yaw    vx     vy     vz     vr     vp     vyaw   ax     ay     az
odom0_config: [false, false, false, false, false, false, true,  true,  false, false, false, true,  false, false, false]
odom0_differential: false
odom0_relative: false
odom0_queue_size: 10

# --- odom1: wheel-encoder velocity (body-frame twist; yaw advisory) ---
odom1: /wheel_odom
#              x      y      z      roll   pitch  yaw    vx     vy     vz     vr     vp     vyaw   ax     ay     az
odom1_config: [false, false, false, false, false, false, true,  false, false, false, false, true,  false, false, false]
odom1_differential: false
odom1_relative: false
odom1_queue_size: 10

# Standard robot_localization template diagonals. Tune the vx (index 6) /
# vyaw (index 11) entries if the fused line is too jerky (raise) or too sluggish
