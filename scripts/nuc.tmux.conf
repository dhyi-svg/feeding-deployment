# NUC tmux config.  Deploy to the NUC as ~/.tmux.conf.

set -g mouse on             # scroll wheel, click-to-select pane, drag to resize

# Permanent e-stop restart hotkey: prefix + r.
# (feeding-nuc.sh also installs this at build time; this line makes it survive a
# full tmux server restart.)
bind r run-shell -b "~/feeding-deployment/scripts/feeding-nuc.sh restart"
