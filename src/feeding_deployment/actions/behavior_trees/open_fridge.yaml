name: "OpenFridge"
description: "Open the fridge."
type: "Behavior"
parameters:
  - name: "Speed"
    description: "Speed of the robot during opening the fridge."
    space:
      type: Enum
      elements: ["low", "medium", "high"]
    is_user_editable: True
    value: "medium"
  - name: "ManipulationConfirm"
    description: "Manipulation confirmation page (detection confirm / plate release): -1 = skip, 0 = show and wait for the user, >0 = show and count down that many seconds before continuing."
    space:
      type: Box
      lower: -1.0
      upper: 1000.0
    is_user_editable: True
    value: 0.0
fn: !hla open_fridge
