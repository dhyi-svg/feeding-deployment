name: "TransferUtensil"
description: "Bring the feeding (bite) utensil to the user's mouth for a bite. A bite transfer starts with an RobotTransferStartCue (robot to human) where the robot conveys to the user that it is ready to initiate the bite transfer, then an UserTransferReadySignal (human to robot) where the human conveys to the robot that it is ready for a bite transfer. After this, the robot moves the feeding utensil (and thus the food item) either near the user's mouth (OutsideMouthDistance defines how near) or inside the user's mouth. Then commences the RobotTransferArrivedCue (robot to human) where the robot conveys to the user that they can take a bite now. After the users is done taking a bite, they use the UserTransferDoneSignal (human to robot) to convey to the robot that they are done. The robot then moves the feeding utensil away from the user's mouth. Once a bite transfer is complete, the robot waits for TaskReselectionAutocontinueSeconds on the web app (web interface) before re-selecting bite transfer again."
type: "Behavior"
parameters:
  - name: "Speed"
    description: "Speed of the robot during bringing the feeding utensil (bite) to the user's mouth."
    space:
      type: "Enum"
      elements: ["low", "medium", "high"]
    is_user_editable: True
    value: "medium"
  - name: "RobotTransferStartCue"
    description: "Cue (robot to user) announcing the robot is about to start the bite transfer."
    space:
      type: "Enum"
      elements: ["silent", "voice", "led", "beep", "voice_led"]
    is_user_editable: True
    value: "voice"
  - name: "UserTransferReadySignal"
    description: "Signal (user to robot) that the user is ready for the bite transfer."
    space:
      type: "Enum"
      elements: ["button", "open_mouth", "auto_timeout"]
    is_user_editable: True
    value: "open_mouth"
  - name: "RobotTransferArrivedCue"
    description: "Cue (robot to user) that the fork has arrived and the user can take the bite."
    space:
      type: "Enum"
      elements: ["silent", "voice", "led", "beep", "voice_led"]
    is_user_editable: True
    value: "voice"
  - name: "UserTransferDoneSignal"
    description: "Signal (user to robot) that the user has finished the bite. Sense corresponds to the robot waiting for the user to bite down on the fork (the robot is detecting downward forces on the fork tip)."
    space:
      type: "Enum"
      elements: ["button", "sense", "auto_timeout"]
    is_user_editable: True
    value: "sense"
  - name: "OutsideMouthDistance"
    description: "Distance from the feeding utensil tip to the user's mouth for the bite transfer."
    space:
      type: "Box"
      lower: 0.05
      upper: 0.15
    is_user_editable: True
    value: 0.1
  - name: "TaskReselectionAutocontinueSeconds"
    description: "Autocontinue duration for re-selecting feeding utensil (bite) transfer after a bite on the web app (web interface). 0 disables the autocontinue (the page waits for the user)."
    space:
      type: "Box"
      lower: 0.0
      upper: 1000.0
    is_user_editable: True
    value: 100.0
  - name: "RetractAfterTransfer"
    description: "Whether the robot retracts to its rest position after completing a bite transfer (1), or stays near the user (0). Retracting avoids obstructing the user's view but makes the meal take longer."
    space:
      type: "Enum"
      elements: [0, 1]
    is_user_editable: True
    value: 0
fn: !hla transfer_utensil
