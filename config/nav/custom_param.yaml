# Custom (non-planner) navigation parameters, loaded directly by
# feeding_deployment/actions/navigate.py (not by move_base).
#
# Post-nav refinement window: after move_base reports SUCCEEDED it has only
# driven to within its goal tolerance and then stopped. This window optionally
# rotates in place toward the goal heading for up to `timeout_s` to close the
# last heading gap, then stops. (xy is left as move_base parked — see below.)
#
# Hardware reality (see cmd_vel_bridge_basicmicro): linear commands are floored
# at ~0.31 m/s (min_lin_units/linear_scale), so fine LINEAR nudges overshoot —
# which is why refinement corrects HEADING ONLY and never translates. Rotation
# has no such floor, so heading is what this base refines smoothly.
refinement:
  # --- master switches -------------------------------------------------------
  enabled: true          # run the refinement window at all
  actuate: true          # true: actively drive to refine; false: monitor only (old behavior)

  # --- timing ----------------------------------------------------------------
  timeout_s: 5.0         # max duration of the window
  rate_hz: 10.0          # control/sample rate (must exceed cmd_vel bridge cmd_timeout)
  window_s: 1.0          # sliding-average window over the error (smooths jitter)
  warmup_s: 1.0          # delay before the divergence safety check arms
  localization_settle_s: 0.0   # refinement starts immediately after the confirm leg parks
                               # (0 = skip the pre-refinement settle entirely). The post-arrival
                               # settle + single replan happens upstream (navigate.py
                               # _GOAL_CONFIRM_SETTLE_S, 10 s) and already follows a settled
                               # estimate; a second wait here bought nothing but latency.

  # --- stop-when-good threshold ---------------------------------------------
  # Heading-only refinement: the controller ALWAYS rotates toward the goal
  # heading (see _refine_cmd) and never translates, so convergence is gated on
  # yaw alone and move_base's position is accepted as parked (x/y are still
  # measured and logged, just never actuated). null => half the planner's
  # yaw_goal_tolerance (~1.43deg) — the heading we refine down to.
  success_yaw_rad: null

  # --- divergence safety (stop if the heading clearly gets worse) ------------
  divergence_margin_rad: 0.02    # stop if avg yaw rises this far above its best (~1.1 deg)

  # --- heading controller (only used when actuate: true) ---------------------
  cmd_vel_topic: /cmd_vel
  k_ang: 1.2             # proportional gain on heading error -> angular vel
  max_ang_rps: 0.4       # clamp on angular velocity (rad/s)
