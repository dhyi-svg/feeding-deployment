name: "PickPlateFromAppliance"
description: "Pick up the plate from the microwave."
type: "Behavior"
parameters:
  - name: "Speed"
    description: "Speed of the robot during picking up the plate."
    space:
      type: Enum
      elements: ["low", "medium", "high"]
    is_user_editable: True
    value: "medium"
  - name: "HandleColor"
    description: "Target HSV color of the attachment to detect (H: 0-179, S: 0-255, V: 0-255)."
    space:
      type: Box
      lower: [0, 0, 0]
      upper: [179, 255, 255]
    is_user_editable: True
    value: [12, 223, 169]
  - name: "ColorRange"
    description: "Tolerance fraction (0.0-1.0) applied proportionally across all HSV channels."
    space:
      type: Box
      lower: 0.0
      upper: 1.0
    is_user_editable: True
    value: 0.1
  - name: "AskForManipulationConfirmation"
    description: "Manipulation confirmation page mode (detection confirm / plate release): 0 = skip, 1 = show with autocontinue, 2 = wait for the user."
    space:
      type: Enum
      elements: [0, 1, 2]
    is_user_editable: True
    value: 2
fn: !hla pick_plate_from_microwave
