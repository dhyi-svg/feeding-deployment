name: "PressMicrowaveButton"
description: "Press the button on the microwave."
type: "Behavior"
parameters:
  - name: "Speed"
    description: "Speed of the robot during placing the plate."
    space:
      type: Enum
      elements: ["low", "medium", "high"]
    is_user_editable: True
    value: "medium"
  - name: "MicrowaveDuration"
    description: "How long the microwave should run, in seconds. Each button press adds 30 seconds, so the robot presses the button MicrowaveDuration/30 times."
    space:
      type: "Box"
      lower: 30.0
      upper: 300.0
    is_user_editable: True
    value: 60.0
  - name: "ManipulationConfirmMode"
    description: "Manipulation confirmation page mode (detection confirm / plate release): 0 = skip, 1 = show with autocontinue, 2 = wait for the user."
    space:
      type: Enum
      elements: [0, 1, 2]
    is_user_editable: True
    value: 2
  - name: "ManipulationConfirmAutocontinueSeconds"
    description: "Seconds before the button detection confirmation page autocontinues when ManipulationConfirmMode is 1. 0 disables the autocontinue (the page waits for the user)."
    space:
      type: "Box"
      lower: 0.0
      upper: 1000.0
    is_user_editable: True
    value: 20.0
fn: !hla press_microwave_button
