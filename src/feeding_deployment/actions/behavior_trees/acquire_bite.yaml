name: "AcquireBite"
description: "Pick up the appropriate food item from the plate. The robot predicts a food item to pickup from the plate and waits BiteSelectionAutocontinueSeconds on the web application (web interface) before auto-continuing the pickup bite button. Within this duration, the user can confirm or change the prediction. The robot then attempts to pick up the food item from the plate and dip it if required. The robot then asks for confirmation on the web application (web interface) before initiating the transfer sequence for a bite, which is controlled by the PickupConfirmMode parameter (mode 1 counts down from PickupConfirmAutocontinueSeconds)."
type: "Behavior"
parameters:
  - name: "Speed"
    description: "Speed of the robot during bite acquisition (bite pickup)."
    space:
      type: Enum
      elements: ["low", "medium", "high"]
    is_user_editable: True
    value: "medium"
  - name: "FoodDippingDepth"
    description: "The depth a food item is dipped into a dipping sauce."
    space:
      type: "Box"
      lower: 0.01
      upper: 0.03
    is_user_editable: True
    value: 0.02
  - name: "SkeweringDepth"
    description: "The depth a food item is skewered."
    space:
      type: "Box"
      lower: 0.01
      upper: 0.05
    is_user_editable: True
    value: 0.015
  - name: "SkeweringOrientation"
    description: "The orientation for skewering food (with respect to major axis of food)."
    space:
      type: Enum
      elements: ["horizontal", "vertical"]
    is_user_editable: True
    value: "horizontal"
  - name: "BiteSelectionAutocontinueSeconds"
    description: "Seconds before the bite-selection page auto-confirms the predicted bite on the web app (web interface). 0 disables the autocontinue (the page waits for the user)."
    space:
      type: "Box"
      lower: 0.0
      upper: 1000.0
    is_user_editable: True
    value: 10.0
  - name: "PickupConfirmMode"
    description: "Bite pickup confirmation page mode: 0 = skip, 1 = show with autocontinue, 2 = wait for the user."
    space:
      type: "Enum"
      elements: [0, 1, 2]
    is_user_editable: True
    value: 2
  - name: "PickupConfirmAutocontinueSeconds"
    description: "Seconds before the bite pickup confirmation page autocontinues when PickupConfirmMode is 1. 0 disables the autocontinue (the page waits for the user)."
    space:
      type: "Box"
      lower: 0.0
      upper: 1000.0
    is_user_editable: True
    value: 20.0
fn: !hla acquire_bite
