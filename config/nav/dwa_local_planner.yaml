DWAPlannerROS:
  # NOT LOADED (TEB is the active local planner). Repointed from the retired
  # /move_base/odom_feedback [2026-07-15] so a future re-enable doesn't ride a
  # dead topic.
  odom_topic: /odometry/fused_imu_wheel

  max_vel_x: 0.3
  min_vel_x: -0.3

  max_vel_y: 0.0
  min_vel_y: 0.0

  max_vel_trans: 0.2
  min_vel_trans: 0.1

  max_vel_theta: 0.5
  min_vel_theta: 0.0

  acc_lim_x: 0.7
  acc_lim_y: 0.0
  acc_lim_theta: 5.0

  xy_goal_tolerance: 0.1 # aim to decrease this to 0.1
  yaw_goal_tolerance: 0.10

  sim_time: 1.5
  vx_samples: 20
  vy_samples: 1
  vtheta_samples: 20

  path_distance_bias: 32.0
  goal_distance_bias: 20.0
  occdist_scale: 0.05

  meter_scoring: true
  transform_tolerance: 0.5