name: "GazeAtTable"
description: "Gaze at the table to perceive the placement surface."
type: "Behavior"
parameters:
  - name: "Speed"
    description: "Speed of the robot during gazing."
    space:
      type: Enum
      elements: ["low", "medium", "high"]
    is_user_editable: True
    value: "medium"
  - name: "ManipulationConfirmMode"
    description: "Manipulation confirmation page mode (detection confirm / plate release): 0 = skip, 1 = show with autocontinue, 2 = wait for the user."
    space:
      type: Enum
      elements: [0, 1, 2]
    is_user_editable: True
    value: 2
  - name: "ManipulationConfirmAutocontinueSeconds"
    description: "Seconds before the placement detection confirmation page autocontinues when ManipulationConfirmMode is 1. 0 disables the autocontinue (the page waits for the user)."
    space:
      type: Box
      lower: 0.0
      upper: 1000.0
    is_user_editable: True
    value: 20.0
fn: !hla gaze_at_table
