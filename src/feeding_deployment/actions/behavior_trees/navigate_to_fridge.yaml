name: "NavigateToFridge"
description: "Navigate to the fridge."
type: "Behavior"
parameters:
  - name: "Speed"
    description: "Arm speed while tucking in before driving to the fridge; the base driving speed is fixed by the navigation config."
    space:
      type: Enum
      elements: ["low", "medium", "high"]
    is_user_editable: True
    value: "medium"
  - name: "ParkingOffset"
    description: "Learned SE(2) offset (dx m, dy m, dyaw rad) applied to the nominal goal pose in the goal's local frame, accumulated from the user's post-arrival position corrections."
    space:
      type: Box
      lower: [-0.5, -0.5, -0.7853981633974483]
      upper: [0.5, 0.5, 0.7853981633974483]
    is_user_editable: True
    value: [0.0, 0.0, 0.0]
  - name: "ArrivalConfirmMode"
    description: "Post-arrival position check/adjust page mode: 0 = skip, 1 = show with autocontinue, 2 = wait for the user."
    space:
      type: Enum
      elements: [0, 1, 2]
    is_user_editable: True
    value: 1
  - name: "ArrivalConfirmAutocontinueSeconds"
    description: "Seconds before the post-arrival position check/adjust page autocontinues when ArrivalConfirmMode is 1. 0 disables the autocontinue (the page waits for the user)."
    space:
      type: Box
      lower: 0.0
      upper: 1000.0
    is_user_editable: True
    value: 20.0
fn: !hla navigate_to_fridge
