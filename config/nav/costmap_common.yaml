
# If your lidar sees something at 9 meters → it will NOT be added as an obstacle.
# If it sees something at 5 meters → it will.
obstacle_range: 8.0

# Maximum distance (meters) at which free space will be cleared.
raytrace_range: 10.0

# After detecting an obstacle, expand it outward by 0.35 meters.
inflation_layer:
  inflation_radius: 0.05

# Robot dimensions: 0.74 m (length, x) × 0.59 m (width, y), centered on base_link
#            y
#            ↑
#   (0.37, 0.295)       (0.37, -0.295)
#              ┌──────────────────────┐
#              │                      │
#              │        ROBOT         │  → x
#              │                      │
#              └──────────────────────┘
#   (-0.37, 0.295)      (-0.37, -0.295)

footprint: [[0.37, 0.295], [0.37, -0.295], [-0.37, -0.295], [-0.37, 0.295]]

observation_sources: lidar_l lidar_r

lidar_l:
  data_type: LaserScan
  topic: /lidar_l/scan
  marking: true
  clearing: true
  min_obstacle_height: -2.0
  max_obstacle_height: 2.0

lidar_r:
  data_type: LaserScan
  topic: /lidar_r/scan
  marking: true
  clearing: true
  min_obstacle_height: -2.0
  max_obstacle_height: 2.0